name: InvoiceShelf CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: invoiceshelf_test
        ports: [ 3306:3306 ]
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v3

    - name: 2. Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mbstring, dom, fileinfo, mysql
        coverage: xdebug

    - name: 3. Install Dependencies (Building)
      run: |
        composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
        cp .env.example .env
        php artisan key:generate

    - name: 4. Run Automated Tests
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: invoiceshelf_test
        DB_USERNAME: root
      run: |
        php artisan migrate --force
        vendor/bin/phpunit --log-junit reports/test-results.xml

    - name: 5. Archive Test Reports (Artifacts)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-reports
        path: reports/
